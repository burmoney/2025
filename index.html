  <script>
    function openWhatsApp() {
      const msg = encodeURIComponent("Hey! I'm interested in Placoso drops.");
      const number = "+523322147756";
      window.open(`https://wa.me/${number}?text=${msg}`, '_blank');
    }

    // Countdown Timer
    document.addEventListener("DOMContentLoaded", () => {
      const countdownEl = document.getElementById("countdown");
      const dropDate = new Date("2025-07-16T00:00:00").getTime(); // your drop date
      const intervalId = setInterval(() => {
        const now = new Date().getTime();
        const distance = dropDate - now;
        if (distance <= 0) {
          countdownEl.innerHTML = "🔥 Drop is Live!";
          clearInterval(intervalId);
          return;
        }
        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distance % 1000 * 60) / 1000);
        countdownEl.textContent = `${d}d ${h}h ${m}m ${s}s`;
      }, 1000);
    });
  </script>
